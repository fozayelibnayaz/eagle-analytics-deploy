services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: eagle-analytics-api
    restart: unless-stopped
    env_file:
      - .env.backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
