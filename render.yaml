services:
  - type: web
    name: eagle-analytics-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements-render.txt
    startCommand: uvicorn api.render_webhook_service:APP --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: eagle3d
      - key: WEBHOOK_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
