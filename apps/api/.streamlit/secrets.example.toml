# Eagle Analytics Hub secrets example
# Copy to .streamlit/secrets.toml locally.
# In production, configure these as platform secrets.

MONGO_URI = "mongodb+srv://USER:PASSWORD@cluster.mongodb.net/?retryWrites=true&w=majority"
MONGO_DB = "eagle3d"

# API ingestion key
INGEST_API_KEY = "replace-with-secure-key"

# Google OIDC / OAuth
[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-random-32-byte-secret"
client_id = "GOOGLE_CLIENT_ID"
client_secret = "GOOGLE_CLIENT_SECRET"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
client_kwargs = { prompt = "select_account", access_type = "offline" }
